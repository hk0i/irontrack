version: '3.8'
services:
  irontrack-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irontrack_web
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=irontrack.localhost
      - VIRTUAL_PORT=80
    networks:
      - switchnet_network
networks:
  switchnet_network:
    external: true
    name: switchnet
