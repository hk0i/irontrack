<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <title>IronTrack</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Tailwind's in-browser JIT scans the DOM for class names and injects CSS.
       Loaded early so it starts scanning before/as Vue mounts; it re-scans on
       DOM mutations so dynamically rendered classes are still picked up. -->
  <script src="vendor/tailwind-browser.js"></script>

  <!-- Vue and Dexie are UMD/global builds, not ES modules, so they're loaded
       as plain scripts and referenced as window.Vue / window.Dexie by our own
       ES module files below. -->
  <script src="vendor/vue.global.prod.js"></script>
  <script src="vendor/dexie.min.js"></script>
</head>
<body class="bg-slate-950">
  <div id="app"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
