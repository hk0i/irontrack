name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp commit hash
        run: echo "export const COMMIT_HASH = '${GITHUB_SHA::7}';" > www/commit.js
      - name: Upload www/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
